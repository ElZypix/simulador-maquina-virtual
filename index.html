<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Básico de Máquina Virtual</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="contenedor">
        <h1>Simulador Básico de Máquina Virtual</h1>
        
        <section class="panel-registros">
            <h2>Ingresar Datos</h2>
            <div class="entradas">
                <input type="number" id="input-ax" placeholder="Valor AX" value="0">
                <input type="number" id="input-bx" placeholder="Valor BX" value="0">
            </div>

            <h2>Estado de Registros</h2>
            <div class="registro">
                <label>Ax:</label>
                <span id="val-ax">0</span>
            </div>
            <div class="registro">
                <label>Bx:</label>
                <span id="val-bx">0</span>
            </div>
            <div class="registro" style="background: #e8f8f5;">
                <label>Cx (Resultado):</label>
                <span id="val-cx">0</span>
            </div>
        </section>

        <section class="panel-pila">
            <h2>Pila</h2>
            <div id="val-pila">Vacía</div>
        </section>
        
        <section class="panel-consola">
            <h2>Consola</h2>
            <div class="entradas-comando" style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="input-comando" placeholder="Escribe un comando ej. ADD, INC Ax, LOOP Ax 5" style="flex-grow: 1; padding: 5px;">
                <button onclick="procesarComando()">Enter</button>
            </div>
            
            <div id="consola"></div>
        </section>
        
        <div class="botones">
            <button onclick="ejecutarOperacion('ADD')">ADD (Sumar)</button>
            <button onclick="ejecutarOperacion('SUB')">SUB (Restar)</button>
            <button onclick="ejecutarOperacion('MUL')">MUL (Multiplicar)</button>
            <button onclick="ejecutarOperacion('DIV')">DIV (Dividir)</button>
            <button onclick="ejecutarOperacion('CMP')">CMP (Comparar)</button>
        </div>

        <div class="menu">
            <select id="registro-seleccionado">
                <option value="Ax">Ax</option>
                <option value="Bx">Bx</option>
                <option value="Cx">Cx</option>
            </select>
            <button onclick="ejecutarIncremento()">Incrementar</button>
            <button onclick="ejecutarDecremento()">Decrementar</button>
        </div>

        <section class="panel-loop">
            <h2>Ciclo Controlado</h2>
            <div class="loop-controles">
                <input type="number" id="input-loop-vueltas" placeholder="Cant." value="1">
                <select id="loop-registro">
                    <option value="Ax">Ax</option>
                    <option value="Bx">Bx</option>
                    <option value="Cx">Cx</option>
                </select>
                <button onclick="ejecutarLoop()" class="btn-loop">Ejecutar</button>
            </div>
        </section>
    </div>
   
    <script src="js/maquina.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
